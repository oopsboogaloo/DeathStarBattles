    <path style="fill:#800000"
          d="m 101.4653,240.33641 29.48658,5.47273 31.17728,-3.11848 23.07796,-10.33576 13.01295,-9.59945 -24.93424,6.37564 -29.04842,4.32099 -34.92999,-1.29629 -22.091594,-4.52213 -12.094048,-1.82963" />
  </g>
  <g inkscape:groupmode="layer" inkscape:label="body" id="saucer-body">
    <path style="fill:#cc0000"
