<!-- saucer2 - simpler ship sprite source (rounded-polygon body variant).
     One colour per Inkscape layer (groupmode="layer"); the build combines each
     layer's shapes into one sprite layer and reads its fill from the child shape.
     Team shade ramp sentinels (dark to light) recolour the saucer per team:
       400000 = team.shade1 (darkest)   cc0000 = team.shade3 (base)
       800000 = team.shade2             ff6666 = team.shade4 (lightest)
     Layers are listed back-to-front: hull rim, lower band, body, dome. -->
