     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
     width="1000" height="1000" viewBox="0 0 264.58333 264.58333" version="1.1">
  <g inkscape:groupmode="layer" inkscape:label="hull" id="saucer-hull">
    <path style="fill:#400000"
          d="m 10.251699,126.02453 -4.0709967,29.53373 9.6589607,27.85862 20.742898,21.11891 38.273032,21.24411 57.871397,11.26658 64.18845,-12.99918 34.60475,-20.68513 17.24301,-21.42402 7.06742,-16.72911 1.36256,-17.97928 -1.57506,-12.43686 -8.7037,25.68492 -26.29086,22.60048 -37.93281,14.00104 -48.08686,5.44076 -48.479038,-4.75088 -37.920467,-15.29981 -26.242058,-21.36368 -9.739757,-24.83462 9.224798,-26.99197" />
  </g>
