<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sprite Benchmark — 96 ships</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 8px; left: 8px; z-index: 10;
    background: rgba(0,0,0,0.6); color: #0f0; font: 13px/1.6 monospace;
    padding: 6px 10px; border-radius: 4px; white-space: pre; pointer-events: none;
  }
  #mode {
    position: fixed; top: 8px; right: 8px; z-index: 10;
    font: 14px monospace; padding: 10px 16px; border-radius: 6px;
    background: #123; color: #9cf; border: 1px solid #46a;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<button id="mode">mode: cached sheet</button>
<script type="module">
import { getSprite, drawSprite } from './src/rendering/sprites/index.js';
import { SpriteSheetCache } from './src/rendering/sprites/SpriteSheetCache.js';

const SHIPS = 96;
const TEAMS = [ // 12 team colours
  [230,57,70],[241,162,8],[42,157,143],[38,70,140],[155,93,229],[0,180,216],
  [255,89,165],[140,200,60],[255,140,40],[90,220,200],[200,60,60],[120,120,255],
];

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hud    = document.getElementById('hud');
const dpr    = window.devicePixelRatio || 1;

function resize() {
  canvas.width  = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width  = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
}
resize();
addEventListener('resize', resize);

const sprite = getSprite('ufo');
const sheets = new SpriteSheetCache();

const colorCache = new Map();
function teamColors(c) {
  const key = c.join(',');
  let v = colorCache.get(key);
  if (!v) {
    v = { key,
          primary:   `rgb(${c[0]},${c[1]},${c[2]})`,
          secondary: `rgb(${Math.min(255,c[0]+90)},${Math.min(255,c[1]+90)},${Math.min(255,c[2]+90)})` };
    colorCache.set(key, v);
  }
  return v;
}

const ships = [];
for (let i = 0; i < SHIPS; i++) {
  ships.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 2.4 * dpr,
    vy: (Math.random() - 0.5) * 2.4 * dpr,
    r: (8 + Math.random() * 20) * dpr,
    team: TEAMS[i % TEAMS.length],
  });
}

let cached = true;
document.getElementById('mode').onclick = e => {
  cached = !cached;
  e.target.textContent = 'mode: ' + (cached ? 'cached sheet' : 'direct vector');
};

let fps = 0, drawMs = 0, prev = performance.now();
function frame(now) {
  fps    = fps * 0.95 + (1000 / Math.max(1, now - prev)) * 0.05;
  prev   = now;

  for (const s of ships) {
    s.x += s.vx; s.y += s.vy;
    if (s.x < s.r && s.vx < 0 || s.x > canvas.width  - s.r && s.vx > 0) s.vx = -s.vx;
    if (s.y < s.r && s.vy < 0 || s.y > canvas.height - s.r && s.vy > 0) s.vy = -s.vy;
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const phase = (now % sprite.duration) / sprite.duration;
  const t0 = performance.now();
  for (const s of ships) {
    const colors = teamColors(s.team);
    if (cached) {
      sheets.draw(ctx, sprite, s.x, s.y, s.r, colors.key, colors, phase);
    } else {
      drawSprite(ctx, sprite, s.x, s.y, s.r, colors, phase);
    }
  }
  drawMs = drawMs * 0.9 + (performance.now() - t0) * 0.1;

  hud.textContent = `ships : ${SHIPS}\nfps   : ${fps.toFixed(1)}\ndraw  : ${drawMs.toFixed(2)} ms\ndpr   : ${dpr}`;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
