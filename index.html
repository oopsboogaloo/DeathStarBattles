<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <title>DeathStarBattles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="canvas-main"></canvas>
  <script type="module" src="src/main.js"></script>
  <!--
    Double-tap-to-zoom is already disabled by `touch-action: manipulation` (set
    on every element above) plus the canvas's own `touch-action: none`. The old
    JS touchend suppressor here was redundant and harmful — preventDefault() on
    touchend ate the synthesised click, so quick taps on the on-screen buttons
    were silently dropped. Removed.
  -->
</body>
</html>
